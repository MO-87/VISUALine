pipeline_name: "01_Cinematic_Prompt_Blur_FAST"

ui:
  display_name: "Cinematic Prompt Blur — Fast"
  category: "AI Editing"
  description: "Fast background blur using text-prompt detection and a soft focus region. Best for quick previews and practical use."
  input_types: ["video", "gif"]
  speed: "medium"
  supports_prompt: true
  is_hq: false
  tags: ["cinematic", "blur", "prompt", "fast", "groundingdino"]

  controls:
    - key: "prompt"
      label: "Subject prompt"
      type: "text"
      default: "person"
      description: "Describe the subject to keep sharp, e.g. person, dog, car, man with glasses."
      node: 0
      param: "prompt"

    - key: "conf"
      label: "Detection confidence"
      type: "slider"
      min: 0.1
      max: 0.8
      step: 0.05
      default: 0.30
      description: "Higher values reduce false detections but may miss the subject."
      advanced: true
      node: 0
      param: "conf"

    - key: "detect_every_n_frames"
      label: "Detection frequency"
      type: "select"
      default: 5
      options: [1, 3, 5, 10]
      description: "Lower is more accurate but slower. Higher is faster but may drift."
      advanced: true
      node: 0
      param: "detect_every_n_frames"

    - key: "max_boxes"
      label: "Focus subjects"
      type: "slider"
      min: 1
      max: 5
      step: 1
      default: 1
      description: "Maximum number of detected subjects to keep sharp."
      advanced: true

    - key: "expand_ratio"
      label: "Focus area size"
      type: "slider"
      min: 0.0
      max: 1.0
      step: 0.05
      default: 0.35
      description: "Expands the detected box to make the sharp region larger."
      node: 1
      param: "expand_ratio"

    - key: "blur_intensity"
      label: "Blur strength"
      type: "slider"
      min: 15
      max: 81
      step: 2
      default: 41
      description: "Controls how strongly the background is blurred."
      node: 2
      param: "blur_intensity"

    - key: "mask_kernel_size"
      label: "Focus softness"
      type: "slider"
      min: 5
      max: 51
      step: 2
      default: 31
      description: "Softens the transition between sharp subject and blurred background."
      advanced: true
      node: 2
      param: "mask_kernel_size"

pipeline:
  - class: "segmentation.prompt_box_detection_node.PromptBoxDetectionNode"
    params:
      model_filename: "groundingdino_swinb_cogcoor.pth"
      config_path: "configs/model_configs/GroundingDINO_SwinB_cfg.py"

      prompt: "person"
      conf: 0.30

      detect_every_n_frames: 5
      reuse_last_boxes: true
      max_missing_frames: 15

      box_format: "xyxy_abs"
      min_box_area_ratio: 0.0002
      max_box_area_ratio: 0.60
      max_boxes: 1

  - class: "utils.soft_box_mask_node.SoftBoxMaskNode"
    params:
      expand_ratio: 0.35
      default_full_mask: true
      mask_value: 255.0

      box_format: "xyxy_abs"
      min_box_area_ratio: 0.0002
      max_box_area_ratio: 0.60
      max_boxes: 1

  - class: "utils.blur_node.BokehBlurNode"
    params:
      blur_intensity: 41
      invert_mask: false
      preserve_mask: false
      mask_kernel_size: 31