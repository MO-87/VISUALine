pipeline_name: "03_Old_Video_Enhancement_SPAN_X4"

ui:
  display_name: "Old Video Enhancement — SPAN x4"
  category: "Restoration"
  description: "Enhance old or low-quality footage with denoising, contrast correction, sharpening, and AI 4x super-resolution."
  input_types: ["video", "gif", "image"]
  speed: "heavy"
  supports_prompt: false
  is_hq: true
  tags: ["restoration", "enhancement", "upscale", "span", "super-resolution", "old video"]

  controls:
    - key: "denoise_strength"
      label: "Pre-denoise"
      type: "slider"
      min: 0.0
      max: 0.25
      step: 0.01
      default: 0.06
      description: "Reduces noise before AI upscaling. Keep this mild before SPAN."
      node: 0
      param: "denoise_strength"

    - key: "contrast"
      label: "Pre-contrast"
      type: "slider"
      min: 0.8
      max: 1.3
      step: 0.01
      default: 1.06
      description: "Light contrast boost before super-resolution."
      node: 0
      param: "contrast"

    - key: "saturation"
      label: "Pre-saturation"
      type: "slider"
      min: 0.5
      max: 1.5
      step: 0.01
      default: 1.04
      description: "Light color enhancement before upscaling."
      node: 0
      param: "saturation"

    - key: "auto_levels"
      label: "Auto levels"
      type: "toggle"
      default: true
      description: "Automatically improves washed-out footage before upscaling."
      node: 0
      param: "auto_levels"

    - key: "levels_strength"
      label: "Auto-level strength"
      type: "slider"
      min: 0.0
      max: 1.0
      step: 0.05
      default: 0.25
      description: "Controls how strongly auto-levels are applied."
      advanced: true
      node: 0
      param: "levels_strength"

    - key: "fp16"
      label: "FP16 acceleration"
      type: "toggle"
      default: true
      description: "Uses mixed precision for faster SPAN inference on CUDA GPUs."
      advanced: true
      node: 1
      param: "fp16"

    - key: "tile_size"
      label: "Tile size"
      type: "select"
      default: 0
      options: [0, 256, 384, 512]
      description: "0 is fastest if VRAM allows. Use 384 or 512 if you get out-of-memory errors."
      advanced: true
      node: 1
      param: "tile_size"

    - key: "post_sharpen_strength"
      label: "Post-sharpness"
      type: "slider"
      min: 0.0
      max: 0.5
      step: 0.01
      default: 0.16
      description: "Adds mild sharpness after AI upscaling."
      node: 2
      param: "sharpen_strength"

    - key: "post_contrast"
      label: "Post-contrast"
      type: "slider"
      min: 0.8
      max: 1.3
      step: 0.01
      default: 1.03
      description: "Final contrast touch after upscaling."
      advanced: true
      node: 2
      param: "contrast"

pipeline:
  # 1. Pre-clean before upscale.
  # Do NOT over-sharpen before super-resolution.
  - class: "utils.video_enhance_node.VideoEnhanceNode"
    params:
      denoise_strength: 0.06
      sharpen_strength: 0.08
      contrast: 1.06
      brightness: 0.01
      saturation: 1.04
      gamma: 0.94
      kernel_size: 5
      auto_levels: true
      levels_low_percentile: 0.01
      levels_high_percentile: 0.99
      levels_strength: 0.25
      preserve_mask: false

  # 2. AI super-resolution.
  - class: "upscale.span_node.SPANNode"
    params:
      model_filename: "spanx4_ch48.pth"
      scale: 4
      feature_channels: 48
      fp16: true

      # Fastest if input is small and fits VRAM.
      tile_size: 0

      # Use 384 or 512 if you get OOM on larger videos.
      tile_overlap: 24

      preserve_mask: false

  # 3. Mild post-enhancement after upscale.
  - class: "utils.video_enhance_node.VideoEnhanceNode"
    params:
      denoise_strength: 0.00
      sharpen_strength: 0.16
      contrast: 1.03
      brightness: 0.00
      saturation: 1.02
      gamma: 1.00
      kernel_size: 5
      auto_levels: false
      preserve_mask: false